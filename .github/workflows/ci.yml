name: CI — ClinicFlow

on:
  push:
    branches: [main, develop, "feat/**", "fix/**"]
  pull_request:
    branches: [main, develop]

env:
  APP_NAME: clinicflow

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check clinicflow/
      - run: ruff format --check clinicflow/

  security:
    name: Security (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install semgrep
      - run: semgrep --config=auto clinicflow/ --error

  standards:
    name: Frappe Standards Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check forbidden patterns
        run: |
          echo "Checking for override_doctype_class..."
          ! grep -r "override_doctype_class" clinicflow/ --include="*.py"
          echo "Checking for raw f-string SQL..."
          ! grep -rn "frappe.db.sql.*f'" clinicflow/ --include="*.py"
          echo "Checking for hardcoded credentials..."
          ! grep -rn "api_key.*=.*['\"][a-zA-Z0-9]{20,}" clinicflow/ --include="*.py"
          echo "Checking for frappe.db.commit in handlers..."
          ! grep -rn "frappe.db.commit" clinicflow/ --include="*.py"
          echo "✅ All Frappe standards checks passed"

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [lint, standards]
    services:
      mariadb:
        image: mariadb:10.6
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: test_db
        ports:
          - 3306:3306
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Setup Frappe bench
        run: |
          pip install frappe-bench
          bench init --skip-redis-config-generation test-bench --python python3
          cd test-bench
          bench new-site test.localhost --no-mariadb-socket --db-host 127.0.0.1 \
            --mariadb-root-password root --admin-password admin
          bench get-app clinicflow $GITHUB_WORKSPACE
          bench --site test.localhost install-app clinicflow
      - name: Run tests
        run: |
          cd test-bench
          bench --site test.localhost run-tests --app clinicflow

  build:
    name: Build Assets
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: |
          npm install -g @frappe/bench
          echo "✅ Build validation complete"
