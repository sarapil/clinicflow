name: Stale Issues — ClinicFlow

on:
  schedule:
    - cron: "0 6 * * 1"  # Monday 06:00 UTC

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: "This issue has been inactive for 30 days. It will be closed in 7 days unless updated."
          stale-pr-message: "This PR has been inactive for 21 days. It will be closed in 7 days unless updated."
          days-before-issue-stale: 30
          days-before-pr-stale: 21
          days-before-close: 7
          exempt-issue-labels: "priority: critical,priority: high,pinned,security"
          exempt-pr-labels: "priority: critical,in-progress,wip"
